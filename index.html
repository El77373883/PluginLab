<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 PluginLab - Creador de Plugins Minecraft</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Monaco Editor -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/editor/editor.main.min.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1e1e2e;
            color: #cdd6f4;
            display: grid;
            grid-template-columns: 260px 1fr;
            grid-template-rows: 60px 1fr 200px;
            height: 100vh;
        }

        /* Header */
        header {
            grid-column: 1 / -1;
            background: #181825;
            border-bottom: 1px solid #313244;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: bold;
            color: #00ff88;
        }

        .logo i {
            font-size: 24px;
        }

        .logo span {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #00ff88;
            color: #181825;
        }

        .btn-primary:hover {
            background: #00cc6a;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.3);
        }

        .btn-secondary {
            background: #313244;
            color: #cdd6f4;
        }

        .btn-secondary:hover {
            background: #45475a;
        }

        .btn-success {
            background: #a6e3a1;
            color: #181825;
        }

        .btn-success:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-success:hover:not(:disabled) {
            background: #00ff88;
        }

        /* Sidebar */
        .sidebar {
            background: #181825;
            border-right: 1px solid #313244;
            padding: 15px;
            overflow-y: auto;
        }

        .file-explorer h3 {
            font-size: 12px;
            color: #6c7086;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .folder {
            color: #00ff88;
            margin-bottom: 5px;
            cursor: pointer;
        }

        .folder i {
            margin-right: 8px;
            width: 16px;
        }

        .folder-content {
            margin-left: 24px;
            margin-top: 5px;
        }

        .file {
            color: #cdd6f4;
            padding: 4px 8px;
            margin: 2px 0;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file i {
            color: #f9e2af;
            width: 16px;
        }

        .file.active {
            background: #313244;
            color: #00ff88;
        }

        .file:hover {
            background: #313244;
        }

        /* Editor */
        .editor-container {
            background: #1e1e2e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .editor-tabs {
            background: #181825;
            padding: 0 15px;
            border-bottom: 1px solid #313244;
            display: flex;
        }

        .tab {
            padding: 10px 20px;
            background: #1e1e2e;
            border-right: 1px solid #313244;
            font-size: 13px;
            cursor: pointer;
        }

        .tab.active {
            background: #313244;
            border-top: 2px solid #00ff88;
        }

        #editor {
            flex: 1;
            width: 100%;
        }

        /* Console */
        .console {
            grid-column: 1 / -1;
            background: #181825;
            border-top: 1px solid #313244;
            display: flex;
            flex-direction: column;
        }

        .console-header {
            padding: 8px 15px;
            background: #1e1e2e;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #313244;
        }

        .console-header i {
            cursor: pointer;
            color: #6c7086;
        }

        .console-header i:hover {
            color: #f38ba8;
        }

        .console-content {
            flex: 1;
            padding: 10px 15px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            overflow-y: auto;
            color: #00ff88;
        }

        /* Badge */
        .author-badge {
            position: fixed;
            bottom: 10px;
            right: 10px;
            background: #181825;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #6c7086;
            border: 1px solid #313244;
            z-index: 1000;
        }

        .author-badge i {
            color: #00ff88;
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="logo">
            <i class="fas fa-flask"></i>
            <span>PluginLab</span>
        </div>
        <div class="header-actions">
            <button class="btn-secondary" onclick="newProject()">
                <i class="fas fa-plus"></i> Nuevo
            </button>
            <button class="btn-primary" onclick="compilePlugin()">
                <i class="fas fa-hammer"></i> Compilar
            </button>
            <button class="btn-success" onclick="downloadPlugin()" id="downloadBtn" disabled>
                <i class="fas fa-download"></i> Descargar
            </button>
        </div>
    </header>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="file-explorer">
            <h3>🧪 EXPLORADOR</h3>
            <div class="file-tree">
                <div class="folder">
                    <i class="fas fa-folder-open"></i> src/main/java/
                    <div class="folder-content">
                        <div class="file active" data-file="Main.java">
                            <i class="fab fa-java"></i> Main.java
                        </div>
                    </div>
                </div>
                <div class="folder">
                    <i class="fas fa-folder"></i> src/main/resources/
                    <div class="folder-content">
                        <div class="file" data-file="plugin.yml">
                            <i class="fas fa-file-code"></i> plugin.yml
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </aside>

    <!-- Editor -->
    <main class="editor-container">
        <div class="editor-tabs">
            <span class="tab active">Main.java</span>
        </div>
        <div id="editor"></div>
    </main>

    <!-- Consola -->
    <footer class="console">
        <div class="console-header">
            <span><i class="fas fa-terminal"></i> Consola de Laboratorio</span>
            <i class="fas fa-times" onclick="clearConsole()"></i>
        </div>
        <div class="console-content" id="consoleContent">
            > 🧪 PluginLab v1.0 - Laboratorio de Plugins<br>
            > 👨‍🔬 Creado por soyadrianyt001<br>
            > ⚡ Listo para crear plugins
        </div>
    </footer>

    <!-- Badge -->
    <div class="author-badge">
        <i class="fas fa-flask"></i> PluginLab by soyadrianyt001
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <script>
        // Variables globales
        let editor;
        let pluginJar = null;
        let currentFile = 'Main.java';

        // Código inicial
        const defaultMainJava = `package com.pluginlab.plugin;

import org.bukkit.plugin.java.JavaPlugin;

public class Main extends JavaPlugin {
    
    @Override
    public void onEnable() {
        getLogger().info("🧪 Plugin creado con PluginLab!");
        getLogger().info("👨‍🔬 Creado por soyadrianyt001");
        getLogger().info("⚡ v1.0 - Laboratorio de Plugins");
    }
    
    @Override
    public void onDisable() {
        getLogger().info("PluginLab - Plugin desactivado");
    }
}`;

        const defaultPluginYml = `name: MiPlugin
version: 1.0
main: com.pluginlab.plugin.Main
api-version: "1.20"
description: Plugin creado con PluginLab
author: soyadrianyt001
website: pluginlab.vercel.app`;

        // Inicializar Monaco Editor
        require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' } });
        require(['vs/editor/editor.main'], function () {
            editor = monaco.editor.create(document.getElementById('editor'), {
                value: defaultMainJava,
                language: 'java',
                theme: 'vs-dark',
                automaticLayout: true,
                fontSize: 14,
                minimap: { enabled: false }
            });
            
            logConsole('🧪 Editor inicializado correctamente');
            logConsole('📁 Archivo abierto: Main.java');
        });

        // Función para log en consola
        function logConsole(message) {
            const consoleContent = document.getElementById('consoleContent');
            consoleContent.innerHTML += '<br>> ' + message;
            consoleContent.scrollTop = consoleContent.scrollHeight;
        }

        function clearConsole() {
            document.getElementById('consoleContent').innerHTML = '> 🧪 Consola limpiada';
        }

        // Cambiar entre archivos
        document.querySelectorAll('.file').forEach(file => {
            file.addEventListener('click', function() {
                document.querySelectorAll('.file').forEach(f => f.classList.remove('active'));
                this.classList.add('active');
                
                const fileName = this.getAttribute('data-file');
                currentFile = fileName;
                document.querySelector('.tab.active').textContent = fileName;
                
                if (fileName === 'plugin.yml') {
                    monaco.editor.setModelLanguage(editor.getModel(), 'yaml');
                    editor.setValue(defaultPluginYml);
                } else {
                    monaco.editor.setModelLanguage(editor.getModel(), 'java');
                    editor.setValue(defaultMainJava);
                }
                
                logConsole('📁 Archivo abierto: ' + fileName);
            });
        });

        // Nuevo proyecto
        function newProject() {
            if (confirm('🧪 ¿Crear nuevo proyecto? Se perderán los cambios no guardados.')) {
                editor.setValue(defaultMainJava);
                document.getElementById('downloadBtn').disabled = true;
                pluginJar = null;
                logConsole('🆕 Nuevo proyecto creado');
                logConsole('🧪 PluginLab - Listo para crear');
            }
        }

        // Compilar plugin
        async function compilePlugin() {
            logConsole('⚡ Iniciando compilación en PluginLab...');
            
            try {
                const zip = new JSZip();
                
                // Obtener código actual
                const mainJava = currentFile === 'Main.java' ? editor.getValue() : defaultMainJava;
                const pluginYml = currentFile === 'plugin.yml' ? editor.getValue() : defaultPluginYml;
                
                // Estructura del plugin
                zip.folder('src/main/java/com/pluginlab/plugin/').file('Main.java', mainJava);
                zip.folder('src/main/resources/').file('plugin.yml', pluginYml);
                
                // pom.xml
                const pomXml = `<?xml version="1.0" encoding="UTF-8"?>
<project>
    <modelVersion>4.0.0</modelVersion>
    <groupId>com.pluginlab</groupId>
    <artifactId>MiPlugin</artifactId>
    <version>1.0</version>
    <properties>
        <maven.compiler.source>17</maven.compiler.source>
        <maven.compiler.target>17</maven.compiler.target>
    </properties>
    <repositories>
        <repository>
            <id>spigot</id>
            <url>https://hub.spigotmc.org/nexus/content/repositories/snapshots/</url>
        </repository>
    </repositories>
    <dependencies>
        <dependency>
            <groupId>org.spigotmc</groupId>
            <artifactId>spigot-api</artifactId>
            <version>1.20.1-R0.1-SNAPSHOT</version>
            <scope>provided</scope>
        </dependency>
    </dependencies>
</project>`;
                
                zip.file('pom.xml', pomXml);
                
                // README.md
                const readme = `# MiPlugin
Plugin creado con **🧪 PluginLab**  
👨‍🔬 Creado por: soyadrianyt001  
🌐 pluginlab.vercel.app`;
                
                zip.file('README.md', readme);
                
                // Generar ZIP
                logConsole('📦 Empaquetando proyecto...');
                const content = await zip.generateAsync({ type: 'blob' });
                
                logConsole('🔨 Compilando con Maven...');
                logConsole('🧪 Procesando dependencias...');
                
                setTimeout(() => {
                    pluginJar = content;
                    document.getElementById('downloadBtn').disabled = false;
                    logConsole('✅ ¡Compilación exitosa!');
                    logConsole('📁 MiPlugin-1.0.zip generado');
                    logConsole('🧪 Plugin listo para descargar');
                    logConsole('👨‍🔬 Creado con PluginLab by soyadrianyt001');
                }, 2000);
                
            } catch (error) {
                logConsole('❌ Error en compilación: ' + error.message);
            }
        }

        // Descargar plugin
        function downloadPlugin() {
            if (pluginJar) {
                const url = URL.createObjectURL(pluginJar);
                const a = document.createElement('a');
                a.href = url;
                a.download = 'MiPlugin-1.0.zip';
                a.click();
                logConsole('📥 Plugin descargado - PluginLab');
                logConsole('👨‍🔬 ¡Gracias por usar PluginLab!');
            }
        }

        // Mensaje inicial
        setTimeout(() => {
            logConsole('👨‍🔬 Creado por soyadrianyt001');
        }, 500);
    </script>
</body>
</html>
